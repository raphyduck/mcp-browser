networks:
  default:
  mcp_edge:
    external: true

services:
  human-browser-mcp:
    image: human-browser-mcp:latest
    build:
      context: ./human-browser-mcp
    environment:
      - HEADLESS=true
      - MCP_TRANSPORT=http
      - MCP_PORT=3000
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-human-browser-mcp}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OAUTH_ISSUER=${OAUTH_ISSUER:-https://brmcp.hobbitton.at}
      - BROWSER_TIMEOUT=30000
      - CAPSOLVER_API_KEY=${CAPSOLVER_API_KEY:-}
    volumes:
      - browser_profile:/app/profile
    restart: unless-stopped
    shm_size: '2gb'
    networks:
      - default
      - mcp_edge
    labels:
      caddy: http://brmcp.hobbitton.at
      caddy.reverse_proxy: "{{upstreams 3000}}"

volumes:
  browser_profile:
