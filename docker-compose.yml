services:
  human-browser-mcp:
    image: human-browser-mcp:latest
    build:
      context: ./human-browser-mcp
    environment:
      - HEADLESS=true
      - MCP_TRANSPORT=http
      - MCP_PORT=3000
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - BROWSER_TIMEOUT=30000
    ports:
      - "3000:3000"
    volumes:
      - browser_profile:/app/profile
    restart: unless-stopped
    shm_size: '2gb'

volumes:
  browser_profile:
